<!DOCTYPE html>
<html>
<head>
<title>ADMIN PANEL - NEOSTORE</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:white;padding:15px;margin-bottom:20px;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.approve{background:green;color:white;}
.reject{background:red;color:white;}
.stats{display:flex;gap:15px;flex-wrap:wrap;}
.stat-box{background:#111;color:#fff;padding:15px;border-radius:10px;flex:1;min-width:150px;}
canvas{background:#fff;border-radius:10px;padding:10px;}
</style>

</head>
<body>

<h1>ADMIN DASHBOARD</h1>

<!-- 1 STATS -->
<div class="stats">
  <div class="stat-box">Total Users: <span id="totalUsers">0</span></div>
  <div class="stat-box">Total Orders: <span id="totalOrders">0</span></div>
  <div class="stat-box">Total Revenue: $<span id="totalRevenue">0</span></div>
  <div class="stat-box">Pending Orders: <span id="pendingOrders">0</span></div>
</div>

<!-- 2 USERS -->
<div class="card">
<h2>Users</h2>
<table id="usersTable"></table>
</div>

<!-- 3 ORDERS -->
<div class="card">
<h2>Orders</h2>
<table id="ordersTable"></table>
</div>

<!-- 4 DELIVERY LOCATIONS -->
<div class="card">
<h2>Delivery Locations</h2>
<table id="deliveryTable"></table>
</div>

<!-- 5 APPROVED ORDERS -->
<div class="card">
<h2>Approved Orders</h2>
<table id="approvedTable"></table>
</div>

<!-- 6 REJECTED ORDERS -->
<div class="card">
<h2>Rejected Orders</h2>
<table id="rejectedTable"></table>
</div>

<!-- 7 MONTHLY SALES -->
<div class="card">
<h2>Sales Per Month</h2>
<canvas id="salesChart"></canvas>
</div>

<!-- 8 MONTHLY ORDERS -->
<div class="card">
<h2>Orders Per Month</h2>
<canvas id="ordersChart"></canvas>
</div>

<!-- 9 SEARCH -->
<div class="card">
<h2>Search Orders</h2>
<input type="text" id="searchBox" placeholder="Search by email or ID..." style="width:100%;padding:10px;">
</div>

<!-- 10 RECENT ACTIVITY -->
<div class="card">
<h2>Recent Orders</h2>
<div id="recentOrders"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= USERS =================
async function renderUsers(){
  const snapshot = await getDocs(collection(db, "users"));

  let html = "<tr><th>Name</th><th>Email</th></tr>";
  let count = 0;

  snapshot.forEach(doc=>{
    const u = doc.data();
    html += `<tr><td>${u.name}</td><td>${u.email}</td></tr>`;
    count++;
  });

  document.getElementById("usersTable").innerHTML = html;
  document.getElementById("totalUsers").textContent = count;
}

// ================= ORDERS =================
async function renderOrders(){
  const snapshot = await getDocs(collection(db, "orders"));

  let html = "<tr><th>ID</th><th>Email</th><th>Total</th><th>Status</th><th>Action</th></tr>";

  let orders = [];
  let revenue = 0;
  let pending = 0;

  snapshot.forEach(docSnap=>{
    const o = docSnap.data();
    const id = docSnap.id;

    orders.push({id, ...o});

    if(o.status === "approved") revenue += o.total;
    if(o.status === "pending") pending++;

    html += `
    <tr>
      <td>${id}</td>
      <td>${o.email || "N/A"}</td>
      <td>$${o.total}</td>
      <td>${o.status}</td>
      <td>
        <button class="approve" onclick="updateOrder('${id}','approved')">Approve</button>
        <button onclick="updateOrder('${id}','shipped')">Ship</button>
        <button onclick="updateOrder('${id}','delivered')">Deliver</button>
        <button class="reject" onclick="updateOrder('${id}','rejected')">Reject</button>
      </td>
    </tr>`;
  });

  document.getElementById("ordersTable").innerHTML = html;
  document.getElementById("totalOrders").textContent = orders.length;
  document.getElementById("totalRevenue").textContent = revenue.toFixed(2);
  document.getElementById("pendingOrders").textContent = pending;

  renderApprovedRejected(orders);
  renderDelivery(orders);
  renderRecent(orders);
  renderCharts(orders);
}

// ================= UPDATE ORDER =================
window.updateOrder = async function(id, status){
  const orderRef = doc(db, "orders", id);

  await updateDoc(orderRef, { status });

  renderOrders();
};

// ================= APPROVED / REJECTED =================
function renderApprovedRejected(orders){
  let approved="", rejected="";

  orders.forEach(o=>{
    if(o.status==="approved"){
      approved += `<tr><td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td></tr>`;
    }
    if(o.status==="rejected"){
      rejected += `<tr><td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td></tr>`;
    }
  });

  document.getElementById("approvedTable").innerHTML = approved || "No approved orders";
  document.getElementById("rejectedTable").innerHTML = rejected || "No rejected orders";
}

// ================= DELIVERY =================
function renderDelivery(orders){
  let html = "<tr><th>Email</th><th>Country</th></tr>";

  orders.forEach(o=>{
    html += `<tr><td>${o.email}</td><td>${o.country || "N/A"}</td></tr>`;
  });

  document.getElementById("deliveryTable").innerHTML = html;
}

// ================= RECENT =================
function renderRecent(orders){
  let html = "";

  orders.slice(-5).reverse().forEach(o=>{
    html += `<div>${o.email} ordered $${o.total} (${o.status})</div>`;
  });

  document.getElementById("recentOrders").innerHTML = html;
}

// ================= CHARTS =================
function renderCharts(orders){
  let months = {};
  let count = {};

  orders.forEach(o=>{
    let m = new Date(o.createdAt || Date.now()).toLocaleString("default",{month:"short"});
    months[m] = (months[m]||0) + o.total;
    count[m] = (count[m]||0) + 1;
  });

  new Chart(document.getElementById("salesChart"),{
    type:"bar",
    data:{labels:Object.keys(months),datasets:[{label:"Sales",data:Object.values(months)}]}
  });

  new Chart(document.getElementById("ordersChart"),{
    type:"line",
    data:{labels:Object.keys(count),datasets:[{label:"Orders",data:Object.values(count)}]}
  });
}

// ================= INIT =================
renderUsers();
renderOrders();

// 🔥 AUTO REFRESH EVERY 5s
setInterval(()=>{
  renderUsers();
  renderOrders();
},5000);

  </script>
  

</body>
</html>
