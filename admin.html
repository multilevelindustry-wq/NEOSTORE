<body>

<h1>ADMIN DASHBOARD</h1>

<!-- 1 STATS -->

  <div class="stat-box">Total Orders: <span id="totalOrders">0</span></div>

<div id="sellerProducts"></div>

<!-- 3 ORDERS -->
<div class="card">
<h2>Orders</h2>
<table id="ordersTable"></table>
</div>

<!-- 4 DELIVERY LOCATIONS -->
<div class="card">
<h2>Delivery Locations</h2>
<table id="deliveryTable"></table>
</div>

<!-- 5 APPROVED ORDERS -->
<div class="card">
<h2>Approved Orders</h2>
<table id="approvedTable"></table>
</div>

<!-- 6 REJECTED ORDERS -->
<div class="card">
<h2>Rejected Orders</h2>
<table id="rejectedTable"></table>
</div>

<!-- 7 MONTHLY SALES -->
<div class="card">
<h2>Sales Per Month</h2>
<canvas id="salesChart"></canvas>
</div>

<!-- 8 MONTHLY ORDERS -->
<div class="card">
<h2>Orders Per Month</h2>
<canvas id="ordersChart"></canvas>

<!-- 9 SEARCH -->
<div class="card">
<h2>Search Orders</h2>
<input type="text" id="searchBox" placeholder="Search by email or ID..." style="width:100%;padding:10px;">
</div>

<div class="card">
<h2>Recent Orders</h2>
<div id="recentOrders"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717",
  measurementId: "G-1PBBK48DCK"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

// make global
window.auth = auth;
window.db = db;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;

window.getDocs = getDocs;

  <script type="module">


// ================= USERS =================
async function renderUsers(){
  const snapshot = await getDocs(collection(db, "users"));

  let html = "<tr><th>Name</th><th>Email</th></tr>";
  let count = 0;

  snapshot.forEach(doc=>{
    const u = doc.data();
    html += `<tr><td>${u.name}</td><td>${u.email}</td></tr>`;
    count++;
  });

  document.getElementById("usersTable").innerHTML = html;
  document.getElementById("totalUsers").textContent = count;
}

// ================= ORDERS =================
async function renderOrders(){
  const snapshot = await getDocs(collection(db, "orders"));

  let html = "<tr><th>ID</th><th>Email</th><th>Total</th><th>Status</th><th>Action</th></tr>";

  let orders = [];
  let revenue = 0;
  let pending = 0;

  snapshot.forEach(docSnap=>{
    const o = docSnap.data();
    const id = docSnap.id;

    orders.push({id, ...o});

    if(o.status === "approved") revenue += o.total;
    if(o.status === "pending") pending++;

    html += `
    <tr>
      <td>${id}</td>
      <td>${o.email || "N/A"}</td>
      <td>$${o.total}</td>
      <td>${o.status}</td>
      <td>
        <button class="approve" onclick="updateOrder('${id}','approved')">Approve</button>
        <button onclick="updateOrder('${id}','shipped')">Ship</button>
        <button onclick="updateOrder('${id}','delivered')">Deliver</button>
        <button class="reject" onclick="updateOrder('${id}','rejected')">Reject</button>
      </td>
    </tr>`;
  });

  document.getElementById("ordersTable").innerHTML = html;
  document.getElementById("totalOrders").textContent = orders.length;
  document.getElementById("totalRevenue").textContent = revenue.toFixed(2);
  document.getElementById("pendingOrders").textContent = pending;

  renderApprovedRejected(orders);
  renderDelivery(orders);
  renderRecent(orders);
  renderCharts(orders);
}

// ================= UPDATE ORDER =================
window.updateOrder = async function(id, status){
  const orderRef = doc(db, "orders", id);

  await updateDoc(orderRef, { status });

  renderOrders();
};

// ================= APPROVED / REJECTED =================
function renderApprovedRejected(orders){
  let approved="", rejected="";

  orders.forEach(o=>{
    if(o.status==="approved"){
      approved += `<tr><td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td></tr>`;
    }
    if(o.status==="rejected"){
      rejected += `<tr><td>${o.id}</td><td>${o.email}</td><td>$${o.total}</td></tr>`;
    }
  });

  document.getElementById("approvedTable").innerHTML = approved || "No approved orders";
  document.getElementById("rejectedTable").innerHTML = rejected || "No rejected orders";
}

// ================= DELIVERY =================
function renderDelivery(orders){
  let html = "<tr><th>Email</th><th>Country</th></tr>";

  orders.forEach(o=>{
    html += `<tr><td>${o.email}</td><td>${o.country || "N/A"}</td></tr>`;
  });

  document.getElementById("deliveryTable").innerHTML = html;
}

// ================= RECENT =================
function renderRecent(orders){
  let html = "";

  orders.slice(-5).reverse().forEach(o=>{
    html += `<div>${o.email} ordered $${o.total} (${o.status})</div>`;
  });

  document.getElementById("recentOrders").innerHTML = html;
}

// ================= CHARTS =================
function renderCharts(orders){
  let months = {};
  let count = {};

  orders.forEach(o=>{
    let m = new Date(o.createdAt || Date.now()).toLocaleString("default",{month:"short"});
    months[m] = (months[m]||0) + o.total;
    count[m] = (count[m]||0) + 1;
  });

  new Chart(document.getElementById("salesChart"),{
    type:"bar",
    data:{labels:Object.keys(months),datasets:[{label:"Sales",data:Object.values(months)}]}
  });

  new Chart(document.getElementById("ordersChart"),{
    type:"line",
    data:{labels:Object.keys(count),datasets:[{label:"Orders",data:Object.values(count)}]}
  });
}

// ================= INIT =================
renderUsers();
renderOrders();

// 🔥 AUTO REFRESH EVERY 5s
setInterval(()=>{
  renderUsers();
  renderOrders();
},5000);

    
async function loadOrders(){
  const ordersSnap = await getDocs(collection(db,"orders"));

  ordersSnap.forEach(async (docSnap)=>{
    const order = docSnap.data();

    for(const item of order.items){

      // 🔥 GET SELLER INFO USING sellerId
      const sellerQuery = query(
        collection(db,"sellers"),
        where("__name__","==", item.sellerId)
      );

      const sellerSnap = await getDocs(sellerQuery);

      sellerSnap.forEach(sellerDoc=>{
        const seller = sellerDoc.data();

        document.getElementById("orders").innerHTML += `
          <div>
            <img src="${item.image}" width="80">
            <h3>${item.title}</h3>
            <p>Price: $${item.price}</p>

            <hr>

            <p><b>Seller:</b> ${seller.name}</p>
            <p>Email: ${seller.email}</p>
            <p>Phone: ${seller.phone}</p>

            <p><b>Bank:</b> ${seller.bankName}</p>
            <p>Acct: ${seller.accountNumber}</p>

          </div>
        `;
      });

    }
  });
    }


  // ================= SELLERS WITH APPROVE/REJECT =================
async function renderSellers() {
  const snapshot = await getDocs(collection(db, "sellers"));

  // Table headers
  let html = `<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Business</th>
    <th>Store</th>
    <th>Product Type</th>
    <th>Bank Name</th>
    <th>Account Number</th>
    <th>Account Name</th>
    <th>ID Number</th>
    <th>Country</th>
    <th>Address</th>
    <th>Status</th>
    <th>Action</th>
  </tr>`;

  snapshot.forEach(doc => {
    const s = doc.data();
    html += `<tr>
      <td>${s.name}</td>
      <td>${s.email}</td>
      <td>${s.phone}</td>
      <td>${s.business}</td>
      <td>${s.storeName}</td>
      <td>${s.productType}</td>
      <td>${s.bankName}</td>
      <td>${s.accountNumber}</td>
      <td>${s.accountName}</td>
      <td>${s.idNumber}</td>
      <td>${s.country}</td>
      <td>${s.address}</td>
      <td>${s.status}</td>
      <td>
        <button class="approve" onclick="updateSellerStatus('${doc.id}','approved')">Approve</button>
        <button class="reject" onclick="updateSellerStatus('${doc.id}','rejected')">Reject</button>
      </td>
    </tr>`;
  });

  document.getElementById("sellersTable").innerHTML = html;
                     }

    renderSellers();

// Optional: auto-refresh every 5s to keep data updated
setInterval(renderSellers, 5000);

    // ================= UPDATE SELLER STATUS =================
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

window.updateSellerStatus = async function(sellerId, status){
  try {
    const sellerRef = doc(db, "sellers", sellerId);
    await updateDoc(sellerRef, { status: status });
    alert(`Seller ${status}!`);
    renderSellers(); // refresh table
  } catch(err){
    console.error("Error updating seller:", err);
    alert("Failed to update status.");
  }
};


    async function loadSellerProducts(){

  const sellersSnap = await getDocs(collection(db,"sellers"));
  const productsSnap = await getDocs(collection(db,"products"));

  let html = "";

  sellersSnap.forEach(sellerDoc => {

    const seller = sellerDoc.data();
    const sellerId = sellerDoc.id;

    html += `<h3 style="margin-top:20px">${seller.name} (${seller.storeName})</h3>`;

    productsSnap.forEach(productDoc => {
      const p = productDoc.data();

      if(p.sellerId === sellerId){

        html += `
        <div style="border:1px solid #ddd;padding:10px;margin:10px 0;">
          <img src="${p.image}" width="80">
          <p><b>${p.title}</b></p>
          <p>$${p.price}</p>
        </div>
        `;
      }

    });

  });

  document.getElementById("sellerProducts").innerHTML = html;
    }


    
  </script>
  

</body>
