<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - NEOSTORE</title>
  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}
    h2{margin-top:30px;}
    .card{background:#fff;padding:15px;margin-bottom:20px;border-radius:10px;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
    button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
    .approve{background:green;color:white;}
    .reject{background:red;color:white;}
  </style>
</head>
<body>

<h1>ADMIN DASHBOARD</h1>

<!-- 1 USERS -->
<div class="card">
  <h2>1. All Users</h2>
  <table id="usersTable"></table>
</div>

<!-- 2 SELLERS -->
<div class="card">
  <h2>2. Sellers</h2>
  <table id="sellersTable"></table>
</div>

<!-- 3 BUYERS -->
<div class="card">
  <h2>3. Buyers</h2>
  <table id="buyersTable"></table>
</div>

<!-- 4 PENDING APPROVAL -->
<div class="card">
  <h2>4. Pending Approval</h2>
  <table id="pendingTable"></table>
</div>

<!-- 5 APPROVED -->
<div class="card">
  <h2>5. Approved Users</h2>
  <table id="approvedTable"></table>
</div>

<!-- 6 REJECTED -->
<div class="card">
  <h2>6. Rejected Users</h2>
  <table id="rejectedTable"></table>
</div>

<!-- 7 ORDERS -->
<div class="card">
  <h2>7. Orders</h2>
  <table id="ordersTable"></table>
</div>

<!-- 8 SELLER PRODUCTS -->
<div class="card">
  <h2>8. Seller Products</h2>
  <table id="productsTable"></table>
</div>

<script>
  
const AUTH_KEY = 'neo_users_v1';

function getUsers(){
  return JSON.parse(localStorage.getItem(AUTH_KEY)||'{}');
}

function saveUsers(users){
  localStorage.setItem(AUTH_KEY, JSON.stringify(users));
}

function renderTables(){
  const users = getUsers();

  let usersHTML = "<tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr>";
  let sellersHTML = usersHTML;
  let buyersHTML = usersHTML;
  let pendingHTML = usersHTML;
  let approvedHTML = usersHTML;
  let rejectedHTML = usersHTML;

  Object.values(users).forEach(u=>{

    if(!u.status) u.status = "pending";

    const row = `
      <tr>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>${u.status}</td>
        <td>
          <button class="approve" onclick="approveUser('${u.email}')">Approve</button>
          <button class="reject" onclick="rejectUser('${u.email}')">Reject</button>
        </td>
      </tr>
    `;

    usersHTML += row;

    if(u.role === "seller") sellersHTML += row;
    if(u.role === "buyer") buyersHTML += row;
    if(u.status === "pending") pendingHTML += row;
    if(u.status === "approved") approvedHTML += row;
    if(u.status === "rejected") rejectedHTML += row;
  });

  document.getElementById('usersTable').innerHTML = usersHTML;
  document.getElementById('sellersTable').innerHTML = sellersHTML;
  document.getElementById('buyersTable').innerHTML = buyersHTML;
  document.getElementById('pendingTable').innerHTML = pendingHTML;
  document.getElementById('approvedTable').innerHTML = approvedHTML;
  document.getElementById('rejectedTable').innerHTML = rejectedHTML;

  renderOrders(users);
  renderProducts(users);
}

// APPROVE
function approveUser(email){
  const users = getUsers();
  users[email].status = "approved";
  saveUsers(users);
  renderTables();
}


// REJECT
function rejectUser(email){
  const users = getUsers();
  users[email].status = "rejected";
  saveUsers(users);
  renderTables();
}

// ORDERS TABLE
function renderOrders(users){
  let html = "<tr><th>ID</th><th>Buyer</th><th>Seller</th><th>Product</th><th>Total</th><th>Status</th><th>Action</th></tr>";

  Object.values(users).forEach(u=>{
    (u.orders||[]).forEach(o=>{
      html += `
      <tr>
        <td>${o.id}</td>
        <td>${o.buyer}</td>
        <td>${o.seller}</td>
        <td>${o.product}</td>
        <td>$${o.total}</td>
        <td>${o.status}</td>
        <td>
          <button onclick="updateOrder('${o.id}','approved')">Approve</button>
          <button onclick="updateOrder('${o.id}','rejected')">Reject</button>
        </td>
      </tr>`;
    });
  });

  document.getElementById('ordersTable').innerHTML = html;
}

function updateOrder(id,status){
  const users = getUsers();

  Object.values(users).forEach(u=>{
    (u.sales||[]).forEach(o=>{ if(o.id===id) o.status=status; });
    (u.orders||[]).forEach(o=>{ if(o.id===id) o.status=status; });
  });

  saveUsers(users);
  renderTables();
                                                        }
</script>

</body>
  </html>
