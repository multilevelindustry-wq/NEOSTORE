<!DOCTYPE html>
<html>
<head>
<title>Admin - Products</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:#fff;padding:15px;margin-bottom:20px;border-radius:10px;}
img{width:100px;border-radius:8px;}
</style>
</head>
<body>

<h1>All Seller Products</h1>
<div id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("products");

// 🔥 REAL-TIME LISTENER
const q = query(collection(db,"products"), orderBy("createdAt","desc"));

onSnapshot(q, snapshot=>{
  container.innerHTML = "";

  snapshot.forEach(doc=>{
    const p = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/100'">
        <h3>${p.title}</h3>
        <p>Price: $${p.price}</p>

        <hr>

        <p><b>Seller:</b> ${p.sellerName}</p>
        <p>Email: ${p.sellerEmail}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
