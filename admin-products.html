<!DOCTYPE html>
<html>
<head>
<title>Admin - Products</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:#fff;padding:15px;margin-bottom:20px;border-radius:10px;}
img{width:100px;border-radius:8px;}
</style>
</head>
<body>

<h1>All Seller Products</h1>
<div id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "<p>Loading...</p>";

  const snapshot = await getDocs(collection(db,"products"));

  container.innerHTML = ""; // 🔥 clears old items

  for (const docSnap of snapshot.docs){
    const p = docSnap.data();

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" alt="product" onerror="this.src='https://via.placeholder.com/100'">
        <h3>${p.title}</h3>
        <p>Price: $${p.price}</p>

        <hr>

        <p><b>Seller:</b> ${p.sellerName || "Unknown"}</p>
        <p>Email: ${p.sellerEmail || "N/A"}</p>
      </div>
    `;
  }
}
  
loadProducts();

  loadProducts();

// 🔥 AUTO REFRESH EVERY 5 SECONDS
setInterval(loadProducts, 5000);
</script>

</body>
</html>
