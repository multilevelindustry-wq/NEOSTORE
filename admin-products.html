<!DOCTYPE html>
<html>
<head>
<title>Admin - Products</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{background:#fff;padding:15px;margin-bottom:20px;border-radius:10px;}
img{width:100px;border-radius:8px;}
</style>
</head>

<body>

<h1>All Seller Products</h1>
<div id="products"></div>

<button onclick="viewSellerProducts('SELLER_ID')">View Seller Products</button>

<script>
function viewSellerProducts(sellerId){
  window.location.href = `admin-products.html?sellerId=${sellerId}`;
}
</script>
  
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){

  const container = document.getElementById("products");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db,"products"));

  snapshot.forEach(docSnap=>{
    const p = docSnap.data();

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <p>Price: $${p.price}</p>
        <p><b>Seller ID:</b> ${p.sellerId}</p>
      </div>
    `;
  });

}

loadProducts();


  const urlParams = new URLSearchParams(window.location.search);
const sellerId = urlParams.get("sellerId");

let snapshot;
if(sellerId){
  snapshot = await getDocs(query(collection(db,"products"), where("sellerId","==",sellerId)));
} else {
  snapshot = await getDocs(collection(db,"products"));
    }

</script>

</body>
</html>
