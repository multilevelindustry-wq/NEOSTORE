<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NEOSTORE</title>

<script src="https://www.paypal.com/sdk/js?client-id=Aey_vJzSIErk6JUHmkIU41JQ4W1vA2FlfBNf5Vtkg7j4YLaWHkFtw4WSPI0SWiCzhaNKqPt2oGuVIF1n&currency=USD"></script>

<style>
:root {--accent:#0ea5a4; --muted:#6b7280; --bg:#f8fafc;}
*{box-sizing:border-box;}
body{font-family:Arial;margin:0;background:var(--bg);}
header{display:flex;justify-content:space-between;padding:15px;background:#fff;}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px;}
.btn{background:var(--accent);color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer;}
.ghost{background:transparent;border:1px solid #ccc;color:#555;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
  <h2>NEOSTORE</h2>
  <div>
    <span id="user-text-mini"></span>
    <button id="cart-btn">Cart (<span id="cart-count"></span>)</button>
  </div>
</header>

<div class="card">
  <h3>Product</h3>
  <p>Vitamin - $24.99</p>
  <button id="add-to-cart" class="btn">Add to Cart</button>
</div>

<div class="card">
  <h3>Cart</h3>
  <div id="cart-list"></div>
  <h4>Total: $<span id="cart-total">0</span></h4>
  <div id="paypal-container"></div>
</div>

<div class="card">
  <h3>Auth</h3>
  <form id="auth-form">
    <input id="auth-name" placeholder="Name"><br><br>
    <input id="auth-email" placeholder="Email"><br><br>
    <input id="auth-password" placeholder="Password" type="password"><br><br>
    <button class="btn">Submit</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.setDoc = setDoc;
window.getDoc = getDoc;
window.doc = doc;
window.collection = collection;
window.addDoc = addDoc;
</script>

<script>
// ===== STORAGE KEYS =====
const CART_KEY = 'neo_cart_v1';
const SESSION_KEY = 'neo_session_v1';

// ===== USER =====
function currentUser(){ return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); }

function renderUser(){
  const u = currentUser();
  document.getElementById('user-text-mini').textContent = u ? u.name : "Guest";
}
renderUser();

// ===== CART =====
function getCart(){ return JSON.parse(localStorage.getItem(CART_KEY)||'[]'); }

function saveCart(cart){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  renderCart();

  const user = currentUser();
  if(user){
    setDoc(doc(db,"carts",user.uid),{
      items:cart,
      updatedAt:Date.now()
    });
  }
}

function addToCart(){
  let cart = getCart();
  cart.push({name:"Vitamin",price:24.99});
  saveCart(cart);
}

document.getElementById('add-to-cart').onclick = addToCart;

function renderCart(){
  const cart = getCart();
  let total = 0;
  const list = document.getElementById('cart-list');
  list.innerHTML = "";

  cart.forEach(i=>{
    total += i.price;
    list.innerHTML += `<div>${i.name} - $${i.price}</div>`;
  });

  document.getElementById('cart-total').textContent = total.toFixed(2);
}
renderCart();

// ===== AUTH =====
document.getElementById('auth-form').addEventListener('submit', async e=>{
  e.preventDefault();

  const name = auth-name.value;
  const email = auth-email.value;
  const password = auth-password.value;

  try{
    let userCredential;

    if(name){
      userCredential = await createUserWithEmailAndPassword(auth,email,password);

      await setDoc(doc(db,"users",userCredential.user.uid),{
        name,email
      });

    }else{
      userCredential = await signInWithEmailAndPassword(auth,email,password);
    }

    const docSnap = await getDoc(doc(db,"users",userCredential.user.uid));
    const data = docSnap.data();

    localStorage.setItem(SESSION_KEY, JSON.stringify({
      uid:userCredential.user.uid,
      name:data.name,
      email:data.email
    }));

    // ✅ REDIRECT TO DASHBOARD
    window.location.href = "dashboard.html";

  }catch(err){
    alert(err.message);
  }
});

// ===== PAYPAL =====
function renderPayPal(){
  const cart = getCart();
  const total = cart.reduce((s,i)=>s+i.price,0);

  if(total<=0) return;

  paypal.Buttons({
    createOrder:(d,a)=>a.order.create({
      purchase_units:[{amount:{value:total.toFixed(2)}}]
    }),
    onApprove:(d,a)=>a.order.capture().then(async ()=>{
      const user = currentUser();

      await addDoc(collection(db,"orders"),{
        userId:user.uid,
        total:total,
        items:cart,
        status:"pending",
        createdAt:Date.now()
      });

      localStorage.removeItem(CART_KEY);
      renderCart();
      alert("Order placed!");
    })
  }).render('#paypal-container');
}
renderPayPal();
</script>

</body>
</html>
