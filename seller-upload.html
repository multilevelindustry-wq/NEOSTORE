<!DOCTYPE html>
<html>
<head>
<title>Seller Upload Product</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.box{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:#0ea5a4;color:white;border:none;}
img{width:100px;margin-top:10px;border-radius:8px;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="box" id="authBox">
<h2>Seller Login / Register</h2>

<input type="text" id="name" placeholder="Full Name (for signup)">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div class="box hidden" id="uploadBox">
<h2>Upload Product</h2>

<input type="text" id="title" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">

<input type="file" id="imageFile">
<input type="text" id="imageUrl" placeholder="Or paste image URL">

<button onclick="uploadProduct()">Upload</button>
<button onclick="logout()">Logout</button>

<img id="preview" style="display:none;">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// AUTH STATE
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("uploadBox").classList.remove("hidden");
  }else{
    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("uploadBox").classList.add("hidden");
  }
});

// SIGNUP
window.signup = async function(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth,email,password);
  const user = userCred.user;

  await setDoc(doc(db,"sellers",user.uid),{
    name,
    email,
    createdAt: Date.now()
  });

  alert("Account created!");
};

// LOGIN
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth,email,password);
  alert("Login successful!");
};

// LOGOUT
window.logout = function(){
  signOut(auth);
};

// IMAGE PREVIEW
document.getElementById("imageFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      const img = document.getElementById("preview");
      img.src = e.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

// UPLOAD PRODUCT
window.uploadProduct = async function(){

  const user = auth.currentUser;
  if(!user){
    alert("Login first");
    return;
  }

  const sellerSnap = await getDoc(doc(db,"sellers",user.uid));
  const seller = sellerSnap.data();

  const title = document.getElementById("title").value;
  const price = Number(document.getElementById("price").value);
  const file = document.getElementById("imageFile").files[0];
  const imageUrlInput = document.getElementById("imageUrl").value;

  let imageUrl = "";

  if(file){
    const storageRef = ref(storage, `products/${user.uid}_${Date.now()}`);
    await uploadBytes(storageRef,file);
    imageUrl = await getDownloadURL(storageRef);
  }else if(imageUrlInput){
    imageUrl = imageUrlInput;
  }else{
    alert("Add image");
    return;
  }

  await addDoc(collection(db,"products"),{
    title,
    price,
    image:imageUrl,
    sellerId:user.uid,
    sellerName:seller.name,
    sellerEmail:seller.email,
    createdAt:Date.now()
  });

  alert("Product uploaded!");

  // CLEAR FORM
  document.getElementById("title").value="";
  document.getElementById("price").value="";
  document.getElementById("imageFile").value="";
  document.getElementById("imageUrl").value="";
  document.getElementById("preview").style.display="none";
};

</script>

</body>
</html>
