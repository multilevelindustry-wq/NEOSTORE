<!DOCTYPE html>
<html>
<head>
<title>Upload Product</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.box{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:#0ea5a4;color:white;border:none;}
img{width:100px;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="box">
<h2>Upload Product</h2>

<input type="text" id="title" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">

<input type="file" id="imageFile">
<input type="text" id="imageUrl" placeholder="Or paste image URL">

<button onclick="uploadProduct()">Upload</button>
<img id="preview" style="display:none;">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// Preview
document.getElementById("imageFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      const img = document.getElementById("preview");
      img.src = e.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

// 🚨 TEMP TEST FIX (REMOVE LATER)
// ensures sellerId exists
if(!localStorage.getItem("sellerId")){
  localStorage.setItem("sellerId", "testSeller123");
}

window.uploadProduct = async function(){
  try{
    const sellerId = localStorage.getItem("sellerId");

    const sellerSnap = await getDoc(doc(db,"sellers",sellerId));

    let sellerName = "Test Seller";
    let sellerEmail = "test@email.com";

    if(sellerSnap.exists()){
      const seller = sellerSnap.data();
      sellerName = seller.name;
      sellerEmail = seller.email;
    }

    const title = document.getElementById("title").value;
    const price = Number(document.getElementById("price").value);
    const file = document.getElementById("imageFile").files[0];
    const imageUrlInput = document.getElementById("imageUrl").value;

    let imageUrl = "";

    if(file){
      const storageRef = ref(storage, `products/${sellerId}_${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    } 
    else if(imageUrlInput){
      imageUrl = imageUrlInput;
    } 
    else {
      alert("Add image");
      return;
    }

    await addDoc(collection(db,"products"),{
      title,
      price,
      image: imageUrl,
      sellerId,
      sellerName,
      sellerEmail,
      createdAt: Date.now()
    });

    alert("Uploaded!");

    // CLEAR FORM
    document.getElementById("title").value = "";
    document.getElementById("price").value = "";
    document.getElementById("imageFile").value = "";
    document.getElementById("imageUrl").value = "";
    document.getElementById("preview").style.display = "none";

  }catch(err){
    alert(err.message);
  }
}
</script>

</body>
</html>
