<script>
// Same keys as main file
const SESSION_KEY = 'neo_session_v1';

function currentUser(){ return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }
function logout(){ localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

// Protect dashboard page
const user = currentUser();
if(!user){ window.location.href = 'index.html#login'; }
else{
  document.getElementById('dashboard-welcome').textContent = `Hello, ${user.name} (${user.email})`;
}

document.getElementById('logout-btn').addEventListener('click', logout);


  function renderDashboard(){
  const u = currentUser();
  
  if(!u){
    document.getElementById('dashboard-welcome').textContent = 'Not logged in';
    return;
  }

  document.getElementById('dashboard-welcome').textContent =
    `Hello, ${u.name} (${u.email})`;

  const users = getUsers();
  const userData = users[u.email];

  const container = document.getElementById("user-orders");

  if(!userData.orders || userData.orders.length === 0){
    container.innerHTML = "<p>No orders yet</p>";
    return;
  }

  let html = "";

  userData.orders.forEach(o => {

    html += `
    <div style="background:#fff;padding:15px;margin-top:15px;border-radius:10px">
      <div><strong>Order ID:</strong> ${o.id}</div>
      <div><strong>Total:</strong> $${o.total}</div>
      <div><strong>Status:</strong> ${o.status}</div>

      <div style="margin-top:10px">
        ${renderTrackingBar(o.status)}
      </div>
    </div>
    `;
  });

  container.innerHTML = html;
  }

function renderTrackingBar(status){

  const steps = ["pending","approved","shipped","delivered"];

  let html = `<div style="display:flex;justify-content:space-between;font-size:12px">`;

  steps.forEach(step => {

    let color = "#ccc";

    if(step === status) color = "orange";

    if(steps.indexOf(step) < steps.indexOf(status)) color = "green";

    html += `
      <div style="text-align:center;flex:1">
        <div style="
          width:20px;height:20px;
          margin:auto;
          border-radius:50%;
          background:${color}">
        </div>
        <div>${step}</div>
      </div>
    `;
  });

  html += `</div>`;

  return html;
  }


  
</script>
