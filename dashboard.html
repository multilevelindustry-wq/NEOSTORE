<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NEOSTORE — Dashboard</title>

<style>
body{
  font-family:Inter,system-ui,Arial,sans-serif;
  background:#f8fafc;
  margin:0;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  max-width:700px;
  margin:auto;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(2,6,23,0.06);
}
button{
  padding:10px 14px;
  border-radius:8px;
  border:0;
  cursor:pointer;
}
.ghost{background:transparent;border:1px solid #e5e7eb;color:#6b7280;}
</style>
</head>

<body>

<div class="card">
  <h2>Dashboard</h2>
  <div id="dashboard-welcome">Loading...</div>

  <!-- USER DETAILS -->
  <h3 style="margin-top:20px">User Details</h3>
  <div id="user-details"></div>

  <!-- ORDERS -->
  <h3 style="margin-top:20px">Your Orders</h3>
  <div id="user-orders"></div>

  <!-- ACTIVITIES -->
  <h3 style="margin-top:20px">Activities</h3>
  <div id="user-activities"></div>

  <div style="margin-top:12px">
    <button id="logout-btn" class="ghost">Logout</button>
    <a href="index.html">
      <button class="ghost">GO SHOP NOW</button>
    </a>
  </div>
</div>

<!-- ✅ FIREBASE FULL SETUP -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  query, 
  where, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// make global
window.db = db;
window.auth = auth;
window.getDocs = getDocs;
window.collection = collection;
window.query = query;
window.where = where;

// load dashboard
loadDashboard();

async function loadDashboard(){
  const SESSION_KEY = 'neo_session_v1';
  const user = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');

  if(!user){
    window.location.href = 'index.html#login';
    return;
  }

  // welcome
  document.getElementById('dashboard-welcome').textContent =
    `Hello, ${user.name} (${user.email})`;

  //////////////////////////
  // USER DETAILS (5)
  //////////////////////////
  document.getElementById("user-details").innerHTML = `
    <div><strong>Name:</strong> ${user.name}</div>
    <div><strong>Email:</strong> ${user.email}</div>
    <div><strong>User ID:</strong> ${user.uid}</div>
    <div><strong>Status:</strong> Active</div>
    <div><strong>Login Time:</strong> ${new Date().toLocaleString()}</div>
  `;

  //////////////////////////
  // FETCH ORDERS FROM FIREBASE
  //////////////////////////
  const ordersDiv = document.getElementById("user-orders");

  const q = query(collection(db, "orders"), where("userId", "==", user.uid));
  const snapshot = await getDocs(q);

  let orders = [];

  snapshot.forEach(doc => {
    orders.push({ id: doc.id, ...doc.data() });
  });

  if(orders.length === 0){
    ordersDiv.innerHTML = "<p>No orders yet</p>";
  } else {
    let html = "";

    orders.forEach(o=>{
      html += `
      <div style="background:#fff;padding:15px;margin-top:15px;border-radius:10px">
        <div><strong>Order ID:</strong> ${o.id}</div>
        <div><strong>Total:</strong> $${o.total}</div>
        <div><strong>Status:</strong> ${o.status}</div>

        <div style="margin-top:10px">
          ${renderTrackingBar(o.status)}
        </div>
      </div>
      `;
    });

    ordersDiv.innerHTML = html;
  }

  //////////////////////////
  // ACTIVITIES (5)
  //////////////////////////
  const cart = JSON.parse(localStorage.getItem("neo_cart_v1") || "[]");

  document.getElementById("user-activities").innerHTML = `
    <div>🛒 Cart Items: ${cart.length}</div>
    <div>📦 Orders Placed: ${orders.length}</div>
    <div>💰 Total Spent: $${orders.reduce((s,o)=>s+(o.total||0),0)}</div>
    <div>🚚 Last Order Status: ${orders.length ? orders[orders.length-1].status : "None"}</div>
    <div>⏱️ Last Activity: ${new Date().toLocaleTimeString()}</div>
  `;
}

// TRACKING BAR
function renderTrackingBar(status){
  const steps = ["pending","approved","shipped","delivered"];

  let html = `<div style="display:flex;justify-content:space-between;font-size:12px">`;

  steps.forEach(step=>{
    let color = "#ccc";

    if(step === status) color = "orange";
    if(steps.indexOf(step) < steps.indexOf(status)) color = "green";

    html += `
      <div style="text-align:center;flex:1">
        <div style="width:20px;height:20px;margin:auto;border-radius:50%;background:${color}"></div>
        <div>${step}</div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

// logout
document.getElementById('logout-btn').addEventListener('click', ()=>{
  localStorage.removeItem('neo_session_v1');
  window.location.href = 'index.html';
});
</script>

</body>
</html>
