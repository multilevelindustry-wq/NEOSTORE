<!DOCTYPE html>
<html>
<head>
<title>Seller Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
</style>
</head>

<body>

<h2>Seller Dashboard</h2>

<div class="grid">
<div class="card">💰 Total Sales: $0</div>
<div class="card">📦 Orders: 0</div>
<div class="card">🛍 Products: 0</div>
<div class="card">💳 Wallet: $0</div>
<div class="card">➕ Add Product</div>
<div class="card">📋 Orders List</div>
<div class="card">💬 Messages</div>
<div class="card">🏧 Withdraw</div>
<div class="card">📊 Sales Chart</div>
</div>

<canvas id="salesChart"></canvas>

<script>
const ctx = document.getElementById('salesChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri','Sat'],
    datasets: [{
      label: 'Sales',
      data: [12,19,3,5,2,3]
    }]
  }
});
</script>

</body>
</html>
