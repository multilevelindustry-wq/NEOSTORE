<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Registration - NEOSTORE</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ddd;
}
button{
  background:#0ea5a4;
  color:white;
  border:none;
  cursor:pointer;
}
h2{text-align:center;}
</style>
</head>

<body>

<div class="container">
<h2>Become a Seller</h2>

<form id="seller-form">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="text" id="phone" placeholder="Phone Number" required>

<input type="text" id="business" placeholder="Business Name" required>
<input type="text" id="country" placeholder="Country" required>
<input type="text" id="address" placeholder="Address" required>

<input type="text" id="bankName" placeholder="Bank Name" required>
<input type="text" id="accountNumber" placeholder="Account Number" required>
<input type="text" id="accountName" placeholder="Account Name" required>

<input type="text" id="idNumber" placeholder="ID Number (NIN/Passport)" required>
<input type="text" id="productType" placeholder="What do you sell?" required>
<input type="text" id="storeName" placeholder="Store Name" required>

<button type="submit">Register Seller</button>

</form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  query, 
  where,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAC3qCkDfdS2X8YA6deg01lXif7qAStfQQ",
  authDomain: "neostore-81b57.firebaseapp.com",
  projectId: "neostore-81b57",
  storageBucket: "neostore-81b57.firebasestorage.app",
  messagingSenderId: "760637387702",
  appId: "1:760637387702:web:3c7c231c34a3513d1a4717"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// WAIT FOR PAGE LOAD
window.addEventListener("DOMContentLoaded", () => {

document.getElementById("seller-form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  try {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const phone = document.getElementById("phone").value;
    const idNumber = document.getElementById("idNumber").value;
    const storeName = document.getElementById("storeName").value;

    // 🔥 DUPLICATE CHECKS
    const emailCheck = query(collection(db, "sellers"), where("email", "==", email));
    const phoneCheck = query(collection(db, "sellers"), where("phone", "==", phone));
    const idCheck = query(collection(db, "sellers"), where("idNumber", "==", idNumber));
    const storeCheck = query(collection(db, "sellers"), where("storeName", "==", storeName));

    const [emailSnap, phoneSnap, idSnap, storeSnap] = await Promise.all([
      getDocs(emailCheck),
      getDocs(phoneCheck),
      getDocs(idCheck),
      getDocs(storeCheck)
    ]);

    if (!emailSnap.empty) return alert("Email already registered!");
    if (!phoneSnap.empty) return alert("Phone already used!");
    if (!idSnap.empty) return alert("ID already used!");
    if (!storeSnap.empty) return alert("Store name already taken!");

    // 🔥 CREATE AUTH ACCOUNT
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    // 🔥 SELLER DATA
    const sellerData = {
      uid: uid,
      name: document.getElementById("name").value,
      email: email,
      phone: phone,

      business: document.getElementById("business").value,
      country: document.getElementById("country").value,
      address: document.getElementById("address").value,

      bankName: document.getElementById("bankName").value,
      accountNumber: document.getElementById("accountNumber").value,
      accountName: document.getElementById("accountName").value,

      idNumber: idNumber,
      productType: document.getElementById("productType").value,
      storeName: storeName,

      status: "pending",
      createdAt: Date.now()
    };

    // 🔥 SAVE USING UID (NO DUPLICATE POSSIBLE)
    await setDoc(doc(db, "sellers", uid), sellerData);

    alert("Seller Registered Successfully!");

    // SAVE sellerId
    localStorage.setItem("sellerId", uid);

    window.location.href = "seller-dashboard.html";

  } catch (error) {

    console.error("ERROR:", error);

    if (error.code === "auth/email-already-in-use") {
      alert("Email already exists!");
    } else {
      alert(error.message);
    }

  }

});

});
</script>

</body>
</html>
